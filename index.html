<script>
// Global games array
let games = [];

// Load games from JSON
async function loadGames() {
  try {
    const response = await fetch('games.json');
    const data = await response.json();
    games = data.games;
    populateGames();
  } catch (error) {
    console.error("Failed to load games.json", error);
    alert("Could not load games list!\nMake sure 'games.json' is in the same folder as this HTML file.");
  }
}

function populateGames(){
  const grids = {
    driving: document.getElementById("drivingGrid"),
    runner: document.getElementById("runnerGrid"),
    classic: document.getElementById("classicGrid"),
    arcade: document.getElementById("arcadeGrid"),
    sandbox: document.getElementById("sandboxGrid"),
    art: document.getElementById("artGrid"),
    utility: document.getElementById("utilityGrid")
  };

  // Clear all grids
  Object.values(grids).forEach(grid => grid.innerHTML = "");

  games.forEach(game => {
    const cardHTML = `
      <div class="card" data-name="${game.name.toLowerCase()}" onclick="openGame('${game.url}','${game.name}')">
        <img src="${game.img}" alt="${game.name}">
        <h3>${game.name}</h3>
      </div>
    `;
    if(grids[game.category]) {
      grids[game.category].innerHTML += cardHTML;
    }
  });
}

/* NAVIGATION */
function enterHub(){
  document.getElementById("start").style.display = "none";
  document.getElementById("browser").style.display = "flex";
  destroyVanta();
  document.getElementById("particles").style.display = "none";
  document.removeEventListener("mousemove", mouseMoveEffect);

  if(games.length === 0) {
    loadGames();
  } else {
    populateGames();
  }
}

// Rest of your script (keep everything else the same: openGame, startGame, etc.)
</script>
